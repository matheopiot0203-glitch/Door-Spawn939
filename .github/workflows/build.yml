name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - name: Build
        run: dotnet build DoorSpawn939.csproj
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: DoorSpawn939
          path: bin/Debug/net48/DoorSpawn939.dll
